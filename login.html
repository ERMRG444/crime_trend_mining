<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Crime Trend Mining</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #101424 0%, #070913 100%);
            overflow: hidden;
            background-image: url('hero_bg.png');
            background-size: cover;
            background-position: center;
        }

        .login-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 9, 19, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        .login-box {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 3rem 2rem;
            animation: fadeIn 0.8s ease forwards;
        }
        
        .login-logo {
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .login-input {
            width: 100%;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 30px;
            color: #fff;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            background: rgba(0,0,0,0.6);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            border-radius: 30px;
            background: linear-gradient(90deg, var(--neon-blue), #0077ff);
            color: #fff;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            transition: 0.3s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
            transform: scale(1.02);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="login-overlay"></div>
    <div class="glass-panel login-box">
        <div class="logo login-logo" style="justify-content: center;">
            <i class="fa-solid fa-user-shield highlight"></i>
            Secure<span class="highlight">Access</span>
        </div>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Authorized Personnel Only</p>
        
        <form id="loginForm">
            <input type="text" id="username" class="login-input" placeholder="Badge Number / Username" required>
            <input type="password" id="password" class="login-input" placeholder="Secure Password" required>
            <button type="submit" class="btn-login">Authenticate</button>
        </form>
        <p id="loginError" style="color: var(--neon-red); margin-top: 1rem; display: none;"></p>
        
        <script>
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    
                    const data = await response.json();
                    if (response.ok && data.status === 'success') {
                        // Store token and role
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('user_role', data.role);
                        
                        // Role-based routing
                        if (data.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    } else {
                        const errorEl = document.getElementById('loginError');
                        errorEl.innerText = data.message || 'Authentication Failed';
                        errorEl.style.display = 'block';
                    }
                } catch (err) {
                    console.error('Login error:', err);
                    const errorEl = document.getElementById('loginError');
                    errorEl.innerText = 'Network error, please try again.';
                    errorEl.style.display = 'block';
                }
            });
        </script>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Return to Home</a>
    </div>
</body>
</html>
